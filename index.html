<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة ورشة السيارات</title>
<!-- Google Fonts removed: it was blocking the page from rendering at all on
     networks that can't reach fonts.googleapis.com. The CSS below already
     falls back to a plain sans-serif font automatically. -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --yellow:#F3B41B;
  --yellow-dark:#D99A00;
  --ink:#1B1B1D;
  --charcoal:#2B2B2E;
  --steel:#8A8D93;
  --mist:#F2F2F0;
  --paper:#FFFFFF;
  --line:#E4E3DF;
  --good:#2E7D50;
  --bad:#C0392B;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Tajawal','Cairo',sans-serif;
  background:var(--mist);
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,h4,.brand,.num{font-family:'Cairo',sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--yellow);}

/* ---------- LOGIN ---------- */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--ink) 0%,var(--charcoal) 55%,#3a3a3c 100%);
  padding:20px;
}
.login-card{
  background:var(--paper);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,0.5);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:"";position:absolute;top:-40px;left:-40px;width:140px;height:140px;
  background:var(--yellow);opacity:.15;border-radius:50%;
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.login-logo .chip{width:14px;height:34px;background:var(--yellow);border-radius:3px;transform:skewX(-12deg);}
.login-logo .chip2{width:14px;height:24px;background:var(--ink);border-radius:3px;transform:skewX(-12deg);margin-top:10px;}
.login-title{font-size:22px;font-weight:800;margin:14px 0 2px;}
.login-sub{color:var(--steel);font-size:13px;margin-bottom:22px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;color:var(--steel);margin-bottom:6px;font-weight:600;}
.field input,.field select,.field textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:14.5px;
  background:#fafaf9;transition:.15s;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--yellow-dark);background:#fff;}
.btn{
  padding:11px 18px;border-radius:9px;font-weight:700;font-size:14.5px;transition:.15s;
}
.btn-primary{background:var(--ink);color:#fff;width:100%;}
.btn-primary:hover{background:#000;}
.btn-yellow{background:var(--yellow);color:var(--ink);}
.btn-yellow:hover{background:var(--yellow-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--ink);}
.btn-danger{background:#fbeceb;color:var(--bad);}
.btn-danger:hover{background:#f5d6d3;}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:7px;}
.login-hint{font-size:12px;color:var(--steel);margin-top:16px;line-height:1.7;background:#faf7ee;border:1px solid #eee0bd;border-radius:8px;padding:10px 12px;}
.err{color:var(--bad);font-size:13px;margin-top:8px;min-height:16px;}

/* ---------- APP SHELL ---------- */
#app{display:none;min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{
  width:230px;background:var(--ink);color:#fff;flex-shrink:0;
  display:flex;flex-direction:column;padding:20px 14px;
}
.side-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 20px;border-bottom:1px solid #3a3a3d;margin-bottom:14px;}
.side-brand img{width:34px;height:34px;border-radius:8px;object-fit:cover;}
.side-brand .no-logo{width:34px;height:34px;border-radius:8px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--ink);}
.side-brand div b{display:block;font-size:14px;}
.side-brand div span{font-size:11px;color:#a9a9ac;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;color:#c9c9cc;
  font-size:14px;font-weight:600;margin-bottom:3px;cursor:pointer;transition:.15s;
}
.nav-item:hover{background:#2c2c2f;color:#fff;}
.nav-item.active{background:var(--yellow);color:var(--ink);}
.nav-icon{width:18px;text-align:center;}
.side-foot{margin-top:auto;padding-top:14px;border-top:1px solid #3a3a3d;}
.side-user{font-size:12.5px;color:#c9c9cc;margin-bottom:8px;}
.side-user b{color:#fff;display:block;font-size:13.5px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:#fff;border-bottom:1px solid var(--line);padding:16px 26px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;
}
.topbar h2{margin:0;font-size:19px;}
.topbar .branch-tag{font-size:12.5px;background:var(--mist);padding:5px 10px;border-radius:20px;color:var(--steel);font-weight:600;}
.content{padding:24px 26px;flex:1;}

.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.card-head h3{margin:0;font-size:16px;}

.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr;}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.stat{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
.stat .lbl{font-size:12.5px;color:var(--steel);font-weight:600;margin-bottom:6px;}
.stat .val{font-size:26px;font-weight:800;}
.stat .sub{font-size:11.5px;color:var(--steel);margin-top:4px;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:var(--mist);text-align:right;padding:10px 12px;font-weight:700;color:var(--charcoal);white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
tr:hover td{background:#fbfbf9;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
.badge-open{background:#fde9c8;color:#8a5a00;}
.badge-paid{background:#dff3e6;color:var(--good);}
.badge-branch{background:#eef0ff;color:#3f4fbf;}

.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:13.5px;background:#fafaf9;}
.spacer{flex:1;}

.modal-bg{
  position:fixed;inset:0;background:rgba(20,20,20,0.55);display:none;align-items:center;justify-content:center;
  z-index:50;padding:20px;
}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{margin-top:0;}
.close-x{position:absolute;left:18px;top:18px;background:none;font-size:20px;color:var(--steel);}

.items-row{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center;}
.items-row input{padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13.5px;}
.rm-item{background:#fbeceb;color:var(--bad);border-radius:7px;padding:8px 10px;font-size:13px;}

/* ---------- INVOICE PRINT SHEET ---------- */
#invoiceSheet{
  width:760px;background:#fff;padding:0;position:relative;font-family:'Tajawal',sans-serif;color:var(--ink);
  border:1px solid #eee;
}
.inv-top{position:relative;height:120px;overflow:hidden;background:#fff;}
.inv-topbar-black{position:absolute;top:0;left:0;width:100%;height:8px;background:var(--ink);}
.inv-head-row{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 30px 0;position:relative;z-index:2;}
.inv-title-ar{font-size:30px;font-weight:800;color:var(--ink);}
.inv-reg{font-size:11px;color:var(--steel);margin-top:8px;line-height:1.8;}
.inv-logo-box{width:92px;height:92px;border:2px solid var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fffdf5;}
.inv-logo-box img{width:100%;height:100%;object-fit:contain;}
.inv-logo-box .placeholder{font-size:11px;color:var(--yellow-dark);font-weight:800;text-align:center;}
.inv-meta{display:flex;justify-content:space-between;padding:14px 30px;font-size:12.5px;color:var(--charcoal);border-bottom:1px solid var(--line);}
.inv-req{padding:14px 30px;font-size:13.5px;font-weight:700;}
.inv-req span{color:var(--steel);font-weight:500;}
table.inv-table{width:100%;border-collapse:collapse;margin-top:6px;}
table.inv-table thead th{background:var(--ink);color:#fff;font-size:12.5px;padding:10px 14px;text-align:center;}
table.inv-table td{padding:9px 14px;text-align:center;font-size:13px;border-bottom:1px solid var(--line);}
table.inv-table td.desc{text-align:right;}
.inv-total-row{display:flex;justify-content:space-between;align-items:center;background:var(--yellow);margin:0 30px;padding:11px 16px;border-radius:8px;margin-top:10px;}
.inv-total-row b{font-size:15px;}
.inv-sign{padding:26px 30px 6px;font-size:13px;}
.inv-thanks{text-align:center;font-weight:800;font-size:14px;color:var(--yellow-dark);padding:8px 0 4px;}
.inv-foot{background:var(--charcoal);color:#e6e6e6;padding:12px 30px;font-size:10.5px;display:flex;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:6px;}

.status-tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700;}
.status-open{background:#fde9c8;color:#8a5a00;}
.status-fixed{background:#dff3e6;color:var(--good);}
.status-progress{background:#e8ecff;color:#3f4fbf;}

.empty{text-align:center;padding:40px 10px;color:var(--steel);font-size:13.5px;}
.hidden{display:none !important;}
label.req::after{content:" *";color:var(--bad);}
.two-col-modal{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:560px){.two-col-modal{grid-template-columns:1fr;}}
.small-note{font-size:12px;background:#faf7ee;border:1px solid #eee0bd;border-radius:8px;padding:9px 12px;color:#6b5c1f;margin-top:10px;}

/* ---------- PARTS INSPECTION ---------- */
.part-cat-title{font-weight:800;font-size:13.5px;margin:16px 0 6px;color:var(--charcoal);padding-bottom:4px;border-bottom:2px solid var(--yellow);}
.part-row{display:grid;grid-template-columns:1.3fr 2fr 46px;gap:10px;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.part-row input[type=range]{width:100%;accent-color:var(--yellow-dark);}
.part-row input[type=number]{width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:13.5px;text-align:center;font-weight:700;}
.part-val{font-weight:800;text-align:left;}
.overall-box{display:flex;align-items:center;justify-content:space-between;background:var(--mist);border-radius:9px;padding:12px 16px;margin-top:14px;font-weight:800;font-size:15px;}
.pbar-wrap{background:var(--line);border-radius:20px;height:9px;width:100%;overflow:hidden;}
.pbar-fill{height:100%;border-radius:20px;}
.plabel-row{display:grid;grid-template-columns:1.4fr 2fr 46px;gap:10px;align-items:center;padding:5px 0;font-size:12.5px;}
.cond-good{color:var(--good);}
.cond-mid{color:#8a5a00;}
.cond-bad{color:var(--bad);}
.sub-tabs{display:flex;gap:8px;margin-bottom:16px;}
.sub-tab-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;background:#fff;border:1.5px solid var(--line);color:var(--steel);}
.sub-tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><div class="chip"></div><div class="chip2"></div></div>
    <div class="login-title">نظام إدارة ورشة السيارات</div>
    <div class="login-sub">تسجيل الدخول للمتابعة إلى حساب الورشة</div>
    <div class="field">
      <label>اسم المستخدم</label>
      <input id="loginUser" placeholder="مثال: admin">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input id="loginPass" type="password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">دخول</button>
    <div class="err" id="loginErr"></div>
    <div class="login-hint" id="loginHint">جاري تحميل بيانات النظام...</div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
<div class="shell">
  <div class="sidebar">
    <div class="side-brand">
      <div id="sideLogoWrap"><div class="no-logo">و</div></div>
      <div><b id="sideWorkshopName">ورشة السيارات</b><span id="sideBranchName">—</span></div>
    </div>
    <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="nav-icon">🏠</span> لوحة التحكم</div>
    <div class="nav-item" data-tab="invoices" onclick="switchTab('invoices')"><span class="nav-icon">🧾</span> الفواتير</div>
    <div class="nav-item" data-tab="diagnostics" onclick="switchTab('diagnostics')"><span class="nav-icon">🔧</span> فحص السيارات</div>
    <div class="nav-item" data-tab="inspections" onclick="switchTab('inspections')"><span class="nav-icon">🚗</span> فحص أجزاء السيارة</div>
    <div class="nav-item" data-tab="reports" onclick="switchTab('reports')"><span class="nav-icon">📊</span> التقارير</div>
    <div class="nav-item" data-tab="branches" onclick="switchTab('branches')"><span class="nav-icon">🏢</span> الفروع</div>
    <div class="nav-item" data-tab="users" onclick="switchTab('users')"><span class="nav-icon">👥</span> المستخدمون</div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings')"><span class="nav-icon">⚙️</span> إعدادات الورشة</div>
    <div class="side-foot">
      <div class="side-user"><b id="sideUserName">—</b><span id="sideUserRole">—</span></div>
      <button class="btn btn-outline btn-sm" style="width:100%;color:#fff;border-color:#4a4a4d;" onclick="doLogout()">تسجيل الخروج</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <h2 id="pageTitle">لوحة التحكم</h2>
      <div class="branch-tag" id="topBranchTag">كل الفروع</div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox" style="position:relative;">
    <button class="close-x" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- hidden print sheet, built dynamically -->
<div style="position:fixed;top:-9999px;left:-9999px;" id="printHost"></div>

<script>
/* ===================================================================
   STORAGE LAYER
=================================================================== */
const SKEY = {
  settings:'workshop-settings',
  users:'workshop-users',
  branches:'workshop-branches',
  invoices:'workshop-invoices',
  diagnostics:'workshop-diagnostics',
  inspections:'workshop-inspections'
};

/* Standard vehicle inspection checklist template, grouped by category */
const CAR_PARTS_TEMPLATE = [
  {cat:'المحرك', items:['زيت المحرك','فلتر الزيت','فلتر الهواء','سير المحرك','خزان المياه (الرديتر)','البواجي','حساسات المحرك']},
  {cat:'نظام الفرامل', items:['تيل الفرامل الأمامي','تيل الفرامل الخلفي','ديسكات الفرامل','زيت الفرامل','فرامل اليد']},
  {cat:'النظام الكهربائي', items:['البطارية','الدينامو (المولد)','المارش','الأسلاك والفيوزات','الأنوار الأمامية والخلفية']},
  {cat:'نظام التعليق والقيادة', items:['المساعدين (الدعمات)','رمان الدركسون','جلدة الدركسون','الكاوتش (الإطارات)','بلي العجل']},
  {cat:'التكييف', items:['غاز الفريون','كمبروسر التكييف','فلتر التكييف']},
  {cat:'الهيكل والدهان', items:['الصدام الأمامي','الصدام الخلفي','الأبواب والمفصلات','الزجاج الأمامي','طلاء الهيكل']}
];
const DIAG_STATUS = {
  open:{label:'قيد الفحص', cls:'status-open'},
  progress:{label:'قيد الإصلاح', cls:'status-progress'},
  fixed:{label:'تم الإصلاح', cls:'status-fixed'}
};
const PART_STATUS = {
  good: {label:'جيد',             score:100, color:'#2E7D50', bg:'#dff3e6'},
  fair: {label:'يحتاج انتباه',     score:50,  color:'#8a5a00', bg:'#fde9c8'},
  bad:  {label:'يحتاج تغيير/تالف', score:0,   color:'#C0392B', bg:'#fbeceb'},
  na:   {label:'لم يتم الفحص',     score:null,color:'#8A8D93', bg:'#eeeeee'}
};
/* Returns a 0-100 condition score for an inspected item.
   New records store an exact percentage; older records stored a status label - map those for backward compatibility. */
function itemScore(it){
  if(it.percentage !== undefined && it.percentage !== null && it.percentage !== '') return Number(it.percentage);
  if(it.status && PART_STATUS[it.status]) return PART_STATUS[it.status].score;
  return null;
}
function conditionLabel(pct){
  if(pct===null) return 'لم يتم الفحص';
  if(pct>=85) return 'ممتاز';
  if(pct>=65) return 'جيد';
  if(pct>=40) return 'يحتاج انتباه';
  return 'يحتاج تغيير/تالف';
}

/* ===================================================================
   STORAGE LAYER - now backed by Google Sheets via Google Apps Script
=================================================================== */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxIEIr7voJFtZVTgjsk9N-44DZPBxbqc1p6p7DA14M1bVzAtirxFFmAILxjlCc0NgcKVA/exec';
const GAS_SECRET = 'mohanedfathi123';

async function sGet(key, fallback){
  try{
    const res = await fetch(`${GAS_URL}?action=get&key=${encodeURIComponent(key)}&secret=${encodeURIComponent(GAS_SECRET)}`);
    const data = await res.json();
    if(data.error){ console.error('Google Sheet get error:', data.error); return fallback; }
    if(data.value === null || data.value === undefined) return fallback;
    return JSON.parse(data.value);
  }catch(e){ console.error('sGet failed', e); return fallback; }
}
async function sSet(key, value){
  try{
    // Writing via GET (like reads already do) avoids a known Google Apps Script issue
    // where a POST request's body can get silently dropped during its internal redirect.
    const url = `${GAS_URL}?action=set&key=${encodeURIComponent(key)}&value=${encodeURIComponent(JSON.stringify(value))}&secret=${encodeURIComponent(GAS_SECRET)}`;
    const res = await fetch(url);
    const data = await res.json();
    if(data.error){ console.error('Google Sheet set error:', data.error); return false; }
    return true;
  }catch(e){ console.error('sSet failed', e); return false; }
}

let DB = { settings:null, users:[], branches:[], invoices:[], diagnostics:[], inspections:[] };
let CURRENT_USER = null;

function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function loadAll(){
  DB.settings = await sGet(SKEY.settings, null);
  DB.users = await sGet(SKEY.users, []);
  DB.branches = await sGet(SKEY.branches, []);
  DB.invoices = await sGet(SKEY.invoices, []);
  DB.diagnostics = await sGet(SKEY.diagnostics, []);
  DB.inspections = await sGet(SKEY.inspections, []);

  let changed = false;
  if(!DB.settings){
    DB.settings = {
      name:'ورشتي لإصلاح السيارات', logo:null, commercialRecord:'', taxNumber:'',
      phone:'', email:'', address:'', website:'', currency:'ريال سعودي', thanksNote:'شكراً لتعاملكم معنا',
      defaultCountryCode:'966'
    };
    changed = true;
  }
  if(DB.settings && !DB.settings.defaultCountryCode){ DB.settings.defaultCountryCode = '966'; changed = true; }
  if(DB.branches.length===0){
    DB.branches.push({id:uid('br'), name:'الفرع الرئيسي', address:''});
    changed = true;
  }
  if(DB.users.length===0){
    DB.users.push({id:uid('u'), username:'admin', password:'admin123', name:'مدير النظام', role:'admin', branchId:'all'});
    changed = true;
  }
  if(changed){ await persistAll(); }
}

async function persistAll(){
  await Promise.all([
    sSet(SKEY.settings, DB.settings),
    sSet(SKEY.users, DB.users),
    sSet(SKEY.branches, DB.branches),
    sSet(SKEY.invoices, DB.invoices),
    sSet(SKEY.diagnostics, DB.diagnostics),
    sSet(SKEY.inspections, DB.inspections)
  ]);
}
async function saveSettings(){ await sSet(SKEY.settings, DB.settings); }

async function downloadInvoicePdf(id){
  const inv = DB.invoices.find(i=>i.id===id);
  const host = document.getElementById('printHost');
  host.innerHTML = buildInvoiceHtml(inv);
  const target = host.querySelector('#invoiceSheet');
  const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const imgWidth = pageWidth - 20;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
  pdf.save(`فاتورة-${inv.carNumber}-${inv.invoiceNo}.pdf`);
  host.innerHTML='';
}

/* Turn a locally-typed phone number into a wa.me-ready international digit string.
   - strips spaces, dashes, parentheses, and a leading +
   - if the number starts with a local trunk "0", replaces it with the workshop's default country code */
function formatPhoneForWhatsapp(rawPhone){
  if(!rawPhone) return '';
  let digits = String(rawPhone).replace(/[^\d]/g, '');
  if(!digits) return '';
  const cc = (DB.settings.defaultCountryCode || '').replace(/[^\d]/g,'');
  if(digits.startsWith('00')) digits = digits.slice(2);
  if(digits.startsWith('0') && cc){ digits = cc + digits.slice(1); }
  return digits;
}

async function sendInvoiceWhatsapp(id){
  const inv = DB.invoices.find(i=>i.id===id);
  const s = DB.settings;
  const waNumber = formatPhoneForWhatsapp(inv.customerPhone);
  const text = waNumber
    ? `فاتورة رقم: ${inv.invoiceNo}\nرقم السيارة: ${inv.carNumber}\nالإجمالي: ${money(inv.total)} ${s.currency}\nمن: ${s.name}\n${s.thanksNote||''}\n\n(مرفق ملف الفاتورة PDF - جرى تنزيله على جهازك، يرجى إرفاقه بالضغط على 📎 في المحادثة)`
    : `فاتورة رقم: ${inv.invoiceNo}\nرقم السيارة: ${inv.carNumber}\nالعميل: ${inv.customerName||'—'}\nالإجمالي: ${money(inv.total)} ${s.currency}\nمن: ${s.name}\n${s.thanksNote||''}`;

  const host = document.getElementById('printHost');
  host.innerHTML = buildInvoiceHtml(inv);
  const target = host.querySelector('#invoiceSheet');
  let file = null;
  try{
    const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 20;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
    if(waNumber){
      // We're targeting a specific contact: WhatsApp's web link can't auto-attach a file to
      // a specific chat (no browser/WhatsApp API allows that), so the best we can do is save
      // the PDF to the device now and open that exact chat with instructions to attach it.
      pdf.save(`فاتورة-${inv.carNumber}.pdf`);
    } else {
      const blob = pdf.output('blob');
      file = new File([blob], `فاتورة-${inv.carNumber}.pdf`, {type:'application/pdf'});
    }
  }catch(e){ /* continue even if PDF generation fails, at least send the text */ }
  host.innerHTML='';

  // No specific contact chosen: native share lets the person pick WhatsApp and a contact,
  // and the file rides along automatically.
  if(!waNumber && file && navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'فاتورة', text}); return; }
    catch(e){ /* fall through to wa.me link below */ }
  }
  const url = waNumber
    ? `https://wa.me/${waNumber}?text=${encodeURIComponent(text)}`
    : `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

/* Shared: build+download a PDF for a printable report, then either open a targeted
   WhatsApp chat (with the file already saved to the device, ready to attach) or,
   when no number is known, hand the file to the native share sheet so the person can
   pick WhatsApp and a contact themselves with the file attached automatically. */
async function sendReportWhatsapp(opts){
  const waNumber = formatPhoneForWhatsapp(opts.phoneRaw);
  const host = document.getElementById('printHost');
  host.innerHTML = opts.sheetHtml;
  const target = host.querySelector('#'+opts.sheetId);
  let file = null;
  try{
    const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 20;
    const imgHeight = canvas.height * imgWidth / canvas.width;
    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
    if(waNumber){ pdf.save(opts.fileName); }
    else { const blob = pdf.output('blob'); file = new File([blob], opts.fileName, {type:'application/pdf'}); }
  }catch(e){ /* still try to send the text even if PDF generation fails */ }
  host.innerHTML = '';
  if(!waNumber && file && navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'تقرير', text:opts.text}); return; }
    catch(e){ /* fall through to wa.me link */ }
  }
  const url = waNumber
    ? `https://wa.me/${waNumber}?text=${encodeURIComponent(opts.text)}`
    : `https://wa.me/?text=${encodeURIComponent(opts.text)}`;
  window.open(url, '_blank');
}

/* ===================================================================
   FULL VEHICLE INSPECTION (فحص أجزاء السيارة بالنسب)
=================================================================== */
function computeInspectionScores(items){
  // items: [{cat, name, percentage}]
  const byCat = {};
  items.forEach(it=>{
    if(!byCat[it.cat]) byCat[it.cat] = [];
    byCat[it.cat].push(it);
  });
  const catScores = Object.keys(byCat).map(cat=>{
    const rated = byCat[cat].filter(it=>itemScore(it)!==null);
    const avg = rated.length ? rated.reduce((s,it)=>s+itemScore(it),0)/rated.length : null;
    return {cat, avg, count:byCat[cat].length, rated:rated.length};
  });
  const allRated = items.filter(it=>itemScore(it)!==null);
  const overall = allRated.length ? Math.round(allRated.reduce((s,it)=>s+itemScore(it),0)/allRated.length) : null;
  return {catScores, overall};
}
function scoreColor(pct){
  if(pct===null) return '#8A8D93';
  if(pct>=80) return '#2E7D50';
  if(pct>=50) return '#D99A00';
  return '#C0392B';
}
function scoreBarHtml(pct, height){
  height = height || 10;
  const color = scoreColor(pct);
  const val = pct===null ? 0 : pct;
  return `<div style="background:#eee;border-radius:20px;height:${height}px;overflow:hidden;">
    <div style="width:${val}%;height:100%;background:${color};border-radius:20px;"></div>
  </div>`;
}

    ${groups[cat].map(idx=>{
      const it = TEMP_INSP_ITEMS[idx];
      return `<div class="part-row" data-idx="${idx}">
        <span>${escapeHtml(it.name)}</span>
        <input type="number" min="0" max="100" step="1" value="${it.percentage}" oninput="updateInspPartValue(${idx}, this.value)" onblur="clampInspPartValue(${idx}, this)">
        <span class="part-val" id="pv_${idx}" style="color:${scoreColor(it.percentage)};">${it.percentage}%</span>
      </div>`;
    }).join('')}
  `).join('') +
  `<div class="overall-box"><span>الحالة العامة المبدئية</span><span id="inspOverallPreview" style="color:${scoreColor(100)};">100%</span></div>`;
}
function updateInspPartValue(idx, val){
  val = Number(val);
  if(isNaN(val)) val = 0;
  TEMP_INSP_ITEMS[idx].percentage = val;
  const pv = document.getElementById('pv_'+idx);
  if(pv){ pv.textContent = val+'%'; pv.style.color = scoreColor(val); }
  const vals = TEMP_INSP_ITEMS.map(it=>it.percentage);
  const avg = Math.round(vals.reduce((s,v)=>s+v,0)/vals.length);
  const ov = document.getElementById('inspOverallPreview');
  if(ov){ ov.textContent = avg+'%'; ov.style.color = scoreColor(avg); }
}
function clampInspPartValue(idx, el){
  let val = Number(el.value);
  if(isNaN(val)) val = 0;
  val = Math.max(0, Math.min(100, val));
  el.value = val;
  updateInspPartValue(idx, val);
}

async function downloadInspectionPdf(id){
  const insp = DB.inspections.find(i=>i.id===id);
  const host = document.getElementById('printHost');
  host.innerHTML = buildInspectionReportHtml(insp);
  const target = host.querySelector('#inspSheet');
  const canvas = await html2canvas(target, {scale:2, backgroundColor:'#ffffff'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const pageWidth = pdf.internal.pageSize.getWidth();
  const imgWidth = pageWidth - 20;
  const imgHeight = canvas.height * imgWidth / canvas.width;
  pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
  pdf.save(`فحص-اجزاء-${insp.carNumber}.pdf`);
  host.innerHTML='';
}

function periodStart(period){
  const now = new Date();
  if(period==='week'){ const d=new Date(now); d.setDate(now.getDate()-7); return d; }
  if(period==='month'){ return new Date(now.getFullYear(), now.getMonth(), 1); }
  return new Date(now.getFullYear(), 0, 1);
}
function renderReportBody(){
  const period = document.getElementById('repPeriod').value;
  const branchSel = document.getElementById('repBranch').value;
  const ids = visibleBranchIds();
  const start = periodStart(period);
  const branchesToShow = branchSel==='all' ? DB.branches.filter(b=>ids.includes(b.id)) : DB.branches.filter(b=>b.id===branchSel);

  const body = document.getElementById('reportBody');
  body.innerHTML = branchesToShow.map(b=>{
    const invs = DB.invoices.filter(i=>i.branchId===b.id && new Date(i.date) >= start);
    const total = invs.reduce((s,i)=>s+Number(i.total||0),0);
    const paid = invs.filter(i=>i.status==='paid').reduce((s,i)=>s+Number(i.total||0),0);
    const unpaid = total - paid;
    const diagCount = DB.diagnostics.filter(d=>d.branchId===b.id && new Date(d.date) >= start).length;
    return `
    <div class="card">
      <div class="card-head"><h3>${escapeHtml(b.name)} — تقرير ${period==='week'?'أسبوعي':period==='month'?'شهري':'سنوي'}</h3>
      <span class="badge badge-branch">${invs.length} فاتورة</span></div>
      <div class="grid grid-4" style="margin-bottom:14px;">
        <div class="stat"><div class="lbl">إجمالي المبيعات</div><div class="val">${money(total)}</div></div>
        <div class="stat"><div class="lbl">مدفوع</div><div class="val" style="color:var(--good);">${money(paid)}</div></div>
        <div class="stat"><div class="lbl">غير مدفوع</div><div class="val" style="color:var(--bad);">${money(unpaid)}</div></div>
        <div class="stat"><div class="lbl">عمليات فحص</div><div class="val">${diagCount}</div></div>
      </div>
      ${invoiceTableHtml(invs.slice().sort((a,b2)=>new Date(b2.date)-new Date(a.date)))}
    </div>`;
  }).join('') || `<div class="empty">لا توجد فروع لعرضها</div>`;
}

function renderPartsReportBody(){
  const period = document.getElementById('repPeriod').value;
  const branchSel = document.getElementById('repBranch').value;
  const ids = visibleBranchIds();
  const start = periodStart(period);
  const branchesToShow = branchSel==='all' ? DB.branches.filter(b=>ids.includes(b.id)) : DB.branches.filter(b=>b.id===branchSel);
  const periodLabel = period==='week'?'أسبوعي':period==='month'?'شهري':'سنوي';

  const body = document.getElementById('reportBody');
  body.innerHTML = branchesToShow.map(b=>{
    const insps = DB.inspections.filter(i=>i.branchId===b.id && new Date(i.date) >= start);
    if(insps.length===0){
      return `<div class="card">
        <div class="card-head"><h3>${escapeHtml(b.name)} — تقرير ${periodLabel} لحالة الأجزاء</h3><span class="badge badge-branch">0 فحص</span></div>
        <div class="empty">لا توجد تقارير فحص أجزاء في هذه الفترة</div>
      </div>`;
    }
    // average % per part name across all inspections in this branch/period
    const partTotals = {}; // name -> {sum, count, cat}
    insps.forEach(insp=>{
      insp.items.forEach(it=>{
        const sc = itemScore(it);
        if(sc===null) return;
        if(!partTotals[it.name]) partTotals[it.name] = {sum:0, count:0, cat:it.cat};
        partTotals[it.name].sum += sc;
        partTotals[it.name].count += 1;
      });
    });
    const partAverages = Object.keys(partTotals).map(name=>({
      name, cat:partTotals[name].cat, avg: Math.round(partTotals[name].sum/partTotals[name].count)
    }));
    const overallAvg = partAverages.length ? Math.round(partAverages.reduce((s,p)=>s+p.avg,0)/partAverages.length) : null;
    // group by category
    const byCat = {};
    partAverages.forEach(p=>{ (byCat[p.cat]=byCat[p.cat]||[]).push(p); });
    const worst = partAverages.slice().sort((a,b2)=>a.avg-b2.avg).slice(0,5);

    return `
    <div class="card">
      <div class="card-head"><h3>${escapeHtml(b.name)} — تقرير ${periodLabel} لحالة الأجزاء</h3><span class="badge badge-branch">${insps.length} فحص</span></div>
      <div class="grid grid-3" style="margin-bottom:16px;">
        <div class="stat"><div class="lbl">متوسط الحالة العامة</div><div class="val" style="color:${scoreColor(overallAvg)};">${overallAvg===null?'—':overallAvg+'%'}</div></div>
        <div class="stat"><div class="lbl">عدد السيارات المفحوصة</div><div class="val">${insps.length}</div></div>
        <div class="stat"><div class="lbl">أجزاء بحاجة اهتمام (أقل من 50%)</div><div class="val" style="color:var(--bad);">${partAverages.filter(p=>p.avg<50).length}</div></div>
      </div>
      <b style="font-size:13.5px;display:block;margin-bottom:8px;">متوسط الحالة حسب الفئة</b>
      ${Object.keys(byCat).map(cat=>{
        const catAvg = Math.round(byCat[cat].reduce((s,p)=>s+p.avg,0)/byCat[cat].length);
        return `<div class="plabel-row"><span>${escapeHtml(cat)}</span><div>${scoreBarHtml(catAvg,8)}</div><b style="color:${scoreColor(catAvg)};">${catAvg}%</b></div>`;
      }).join('')}
      <b style="font-size:13.5px;display:block;margin:16px 0 8px;">الأجزاء الأكثر احتياجًا للمتابعة</b>
      ${worst.map(p=>`<div class="plabel-row"><span>${escapeHtml(p.name)} <span style="color:var(--steel);font-size:11px;">(${escapeHtml(p.cat)})</span></span><div>${scoreBarHtml(p.avg,8)}</div><b style="color:${scoreColor(p.avg)};">${p.avg}%</b></div>`).join('')}
    </div>`;
  }).join('') || `<div class="empty">لا توجد فروع لعرضها</div>`;
}

      <div class="field"><label class="req">الاسم الكامل</label><input id="uName" value="${escapeHtml(u.name)}"></div>
      <div class="field"><label class="req">اسم المستخدم</label><input id="uUsername" value="${escapeHtml(u.username)}"></div>
      <div class="field"><label class="req">كلمة المرور</label><input id="uPassword" value="${escapeHtml(u.password)}"></div>
      <div class="field"><label>الدور</label><select id="uRole" onchange="document.getElementById('uBranchField').classList.toggle('hidden', this.value==='admin')">
        <option value="staff" ${u.role==='staff'?'selected':''}>موظف فرع</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>مدير النظام (كل الفروع)</option>
      </select></div>
    </div>
    <div class="field ${u.role==='admin'?'hidden':''}" id="uBranchField"><label>الفرع</label>
      <select id="uBranch">${DB.branches.map(b=>`<option value="${b.id}" ${b.id===u.branchId?'selected':''}>${escapeHtml(b.name)}</option>`).join('')}</select>
    </div>`;
}
function openUserModal(){
  document.getElementById('modalContent').innerHTML = `
    <h3>مستخدم جديد</h3>${userFormFields()}
    <div style="display:flex;gap:10px;margin-top:10px;"><button class="btn btn-primary" style="flex:1;" onclick="submitUser()">حفظ</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`;
  openModal();
}
async function submitUser(){
  const username = document.getElementById('uUsername').value.trim();
  if(!username || !document.getElementById('uName').value.trim() || !document.getElementById('uPassword').value){ alert('يرجى تعبئة الحقول المطلوبة'); return; }
  if(DB.users.some(u=>u.username===username)){ alert('اسم المستخدم مستخدم من قبل'); return; }
  const role = document.getElementById('uRole').value;
  DB.users.push({
    id:uid('u'), name:document.getElementById('uName').value.trim(), username,
    password:document.getElementById('uPassword').value, role,
    branchId: role==='admin' ? 'all' : document.getElementById('uBranch').value
  });
  await saveUsers();
  closeModal();
  renderUsers();
}
function editUser(id){
  const u = DB.users.find(x=>x.id===id);
  document.getElementById('modalContent').innerHTML = `
    <h3>تعديل مستخدم</h3>${userFormFields(u)}
    <div style="display:flex;gap:10px;margin-top:10px;"><button class="btn btn-primary" style="flex:1;" onclick="updateUser('${u.id}')">حفظ</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`;
  openModal();
}
async function updateUser(id){
  const u = DB.users.find(x=>x.id===id);
  u.name = document.getElementById('uName').value.trim();
  u.username = document.getElementById('uUsername').value.trim();
  u.password = document.getElementById('uPassword').value;
  u.role = document.getElementById('uRole').value;
  u.branchId = u.role==='admin' ? 'all' : document.getElementById('uBranch').value;
  await saveUsers();
  closeModal();
  renderUsers();
  if(CURRENT_USER.id===u.id){ CURRENT_USER = u; renderShell(); }
}
async function deleteUser(id){
  if(!confirm('حذف هذا المستخدم؟')) return;
  DB.users = DB.users.filter(x=>x.id!==id);
  await saveUsers();
  renderUsers();
}

/* ===================================================================
   SETTINGS (admin only)
=================================================================== */
function renderSettings(){
  const s = DB.settings;
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="card" style="max-width:640px;">
      <h3>بيانات الورشة</h3>
      <div class="field"><label class="req">اسم الورشة</label><input id="sName" value="${escapeHtml(s.name)}"></div>
      <div class="two-col-modal">
        <div class="field"><label>السجل التجاري</label><input id="sCR" value="${escapeHtml(s.commercialRecord)}"></div>
        <div class="field"><label>الرقم الضريبي</label><input id="sTax" value="${escapeHtml(s.taxNumber)}"></div>
        <div class="field"><label>رقم الهاتف</label><input id="sPhone" value="${escapeHtml(s.phone)}"></div>
        <div class="field"><label>البريد الإلكتروني</label><input id="sEmail" value="${escapeHtml(s.email)}"></div>
        <div class="field"><label>الموقع الإلكتروني</label><input id="sWebsite" value="${escapeHtml(s.website)}"></div>
        <div class="field"><label>العملة</label><input id="sCurrency" value="${escapeHtml(s.currency)}"></div>
        <div class="field"><label>كود الدولة الافتراضي (لأرقام واتساب العميل)</label><input id="sCountryCode" value="${escapeHtml(s.defaultCountryCode)}" placeholder="مثال: 966 للسعودية، 20 لمصر"></div>
      </div>
      <div class="field"><label>العنوان</label><input id="sAddress" value="${escapeHtml(s.address)}"></div>
      <div class="field"><label>عبارة الشكر في نهاية الفاتورة</label><input id="sThanks" value="${escapeHtml(s.thanksNote)}"></div>
      <div class="field">
        <label>شعار الورشة</label>
        <input type="file" id="sLogoFile" accept="image/*" onchange="previewLogo(event)">
        <div style="margin-top:10px;display:flex;align-items:center;gap:12px;">
          <div style="width:64px;height:64px;border:1.5px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;" id="logoPreviewBox">
            ${s.logo?`<img src="${s.logo}" style="width:100%;height:100%;object-fit:contain;">`:'<span style="font-size:11px;color:var(--steel);">لا يوجد</span>'}
          </div>
          ${s.logo?`<button class="btn btn-outline btn-sm" onclick="removeLogo()">إزالة الشعار</button>`:''}
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:6px;" onclick="submitSettings()">حفظ الإعدادات</button>
    </div>`;
}
let PENDING_LOGO = null;
function previewLogo(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    PENDING_LOGO = reader.result;
    document.getElementById('logoPreviewBox').innerHTML = `<img src="${PENDING_LOGO}" style="width:100%;height:100%;object-fit:contain;">`;
  };
  reader.readAsDataURL(file);
}
async function removeLogo(){
  DB.settings.logo = null;
  PENDING_LOGO = null;
  await saveSettings();
  renderSettings();
  renderShell();
}
async function submitSettings(){
  const s = DB.settings;
  s.name = document.getElementById('sName').value.trim() || s.name;
  s.commercialRecord = document.getElementById('sCR').value.trim();
  s.taxNumber = document.getElementById('sTax').value.trim();
  s.phone = document.getElementById('sPhone').value.trim();
  s.email = document.getElementById('sEmail').value.trim();
  s.website = document.getElementById('sWebsite').value.trim();
  s.currency = document.getElementById('sCurrency').value.trim() || s.currency;
  s.defaultCountryCode = document.getElementById('sCountryCode').value.trim() || s.defaultCountryCode;
  s.address = document.getElementById('sAddress').value.trim();
  s.thanksNote = document.getElementById('sThanks').value.trim();
  if(PENDING_LOGO){ s.logo = PENDING_LOGO; PENDING_LOGO = null; }
  await saveSettings();
  renderShell();
  alert('تم حفظ الإعدادات بنجاح');
}
